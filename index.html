<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">

<link rel="stylesheet" href="./resources/ol.css">
<link rel="stylesheet" href="resources/fontawesome-all.min.css">
<link rel="stylesheet" href="./resources/ol-layerswitcher.css">
<link rel="stylesheet" href="./resources/qgis2web.css">

<style>

/* =========================
   FULL MAPA
========================= */
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}

#map {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0; /* FULL SCREEN */
}

/* =========================
   BOTÓN
========================= */
#btn-tabla {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    padding: 10px 12px;
    background: white;
    border: 1px solid #ccc;
    cursor: pointer;
}

/* =========================
   OVERLAY FULL SCREEN LISTADO
========================= */
#panel-tabla {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: white;
    z-index: 9998;
    display: none;
    overflow: auto;
    padding: 10px;
}

/* cuando está activo */
#panel-tabla.abierto {
    display: block;
}

/* =========================
   TABLA
========================= */
table {
    width: max-content; /* permite TODAS las columnas */
    border-collapse: collapse;
    min-width: 100%;
}

td, th {
    border: 1px solid #ddd;
    padding: 6px;
    font-size: 12px;
    white-space: nowrap;
}

thead th {
    position: sticky;
    top: 0;
    background: #f2f2f2;
    z-index: 2;
}

h2 {
    margin: 10px 0;
}

</style>

<title>Mapa Pluvial</title>
</head>

<body>

<!-- BOTÓN -->
<button id="btn-tabla">☰ Listado</button>

<!-- PANEL FULL SCREEN -->
<div id="panel-tabla">

<h2>RESUMEN</h2>

<table id="tabla-datos">
    <thead>
        <tr id="encabezado"></tr>
    </thead>
    <tbody></tbody>
</table>

</div>

<!-- MAPA -->
<div id="map"></div>

<!-- LIBRERÍAS QGIS2WEB -->
<script src="./resources/ol.js"></script>
<script src="./layers/PadrnRP_1.js"></script>
<script src="./layers/layers.js"></script>
<script src="./resources/qgis2web.js"></script>

<script>

/* =========================
   BOTÓN ABRIR / CERRAR
========================= */
document.getElementById("btn-tabla").addEventListener("click", function () {
    document.getElementById("panel-tabla").classList.toggle("abierto");
});


/* =========================
   ORDEN ZONA + RP
========================= */
function ordenarFeatures(features) {

    return features.sort((a, b) => {

        const pA = a.getProperties();
        const pB = b.getProperties();

        // ---- ZONA (Z1, Z2, Z10...)
        const zonaA = parseInt((pA['Datos_Zona'] || '').replace(/\D/g, '')) || 0;
        const zonaB = parseInt((pB['Datos_Zona'] || '').replace(/\D/g, '')) || 0;

        if (zonaA !== zonaB) return zonaA - zonaB;

        // ---- N° RP (RP-Z1-1, RP-Z1-2...)
        const rpA = (pA['N�RP'] || '').split('-').pop();
        const rpB = (pB['N�RP'] || '').split('-').pop();

        return (parseInt(rpA) || 0) - (parseInt(rpB) || 0);
    });
}


/* =========================
   TABLA
========================= */
function generarTabla(layer) {

    const tabla = document.querySelector("#tabla-datos tbody");
    const encabezado = document.querySelector("#encabezado");

    tabla.innerHTML = "";
    encabezado.innerHTML = "";

    let features = layer.getSource().getFeatures();

    features = ordenarFeatures(features);

    const campos = [
        'N�RP',
        'Datos_Zona',
        'Datos_COM',
        'Datos_CALLE',
        'Datos_INICIO',
        'Datos_FIN',
        'Datos_Fecha de limpieza',
        'Datos_Fecha de verificaci�n',
        'Datos_Foto'
    ];

    const alias = {
        'N�RP': 'N° RP',
        'Datos_Zona': 'Zona',
        'Datos_COM': 'Comuna',
        'Datos_CALLE': 'Calle',
        'Datos_INICIO': 'Inicio',
        'Datos_FIN': 'Fin',
        'Datos_Fecha de limpieza': 'Limpieza',
        'Datos_Fecha de verificaci�n': 'Verificación',
        'Datos_Foto': 'Foto'
    };

    // encabezado
    campos.forEach(c => {
        let th = document.createElement("th");
        th.textContent = alias[c] || c;
        encabezado.appendChild(th);
    });

    // filas
    features.forEach(f => {

        let tr = document.createElement("tr");
        let p = f.getProperties();

        campos.forEach(campo => {

            let td = document.createElement("td");

            if (campo === 'Datos_Foto' && p[campo]) {
                let a = document.createElement("a");
                a.href = p[campo];
                a.target = "_blank";
                a.textContent = "Ver";
                td.appendChild(a);
            } else {
                td.textContent = p[campo] || "";
            }

            tr.appendChild(td);
        });

        tabla.appendChild(tr);
    });
}


/* =========================
   ESPERAR LAYER QGIS2WEB
========================= */
function esperar() {

    if (
        typeof lyr_PadrnRP_1 !== "undefined" &&
        lyr_PadrnRP_1.getSource() &&
        lyr_PadrnRP_1.getSource().getFeatures().length > 0
    ) {
        generarTabla(lyr_PadrnRP_1);
    } else {
        setTimeout(espero, 500);
    }
}

esperar();

</script>

</body>
</html>
