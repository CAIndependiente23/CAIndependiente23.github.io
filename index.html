        <script>

function generarTablaDesdeLayer(layer) {
    const tabla = document.querySelector("#tabla-datos tbody");
    const encabezado = document.querySelector("#encabezado");

    tabla.innerHTML = "";
    encabezado.innerHTML = "";

    const features = layer.getSource().getFeatures();

    if (!features.length) return;

    const props = features[0].getProperties();
    const campos = [
    'N�RP',
    'Datos_Zona',
    'Datos_COM',
    'Datos_CALLE',
    'Datos_INICIO',
    'Datos_FIN',
    'Datos_Fecha de limpieza',
    'Datos_Fecha de verificaci�n',
    'Datos_Foto'
];
    const alias = {
    'N�RP': 'N° RP',
    'Datos_Zona': 'Zona',
    'Datos_COM': 'Comuna',
    'Datos_CALLE': 'Calle',
    'Datos_INICIO': 'Inicio',
    'Datos_FIN': 'Fin',
    'Datos_Fecha de limpieza': 'Fecha de limpieza',
    'Datos_Fecha de verificaci�n': 'Fecha de verificación',
    'Datos_Foto': 'Foto'
};
    // Encabezado
    campos.forEach(campo => {
        let th = document.createElement("th");
        th.textContent = alias[campo] || campo;
        encabezado.appendChild(th);
    });

    // Filas
    features.forEach(f => {
        let tr = document.createElement("tr");
        let propiedades = f.getProperties();

        campos.forEach(campo => {
            let td = document.createElement("td");
            if (campo === 'Datos_Foto' && propiedades[campo]) {
    let link = document.createElement("a");
    link.href = propiedades[campo];
    link.target = "_blank";
    link.textContent = "Ver foto";
    td.appendChild(link);
} else {
    td.textContent = propiedades[campo];
}
            tr.appendChild(td);
        });

        tabla.appendChild(tr);
    });
}

function esperarYGenerarTabla() {
    if (
        typeof lyr_PadrnRP_1 !== "undefined" &&
        lyr_PadrnRP_1.getSource() &&
        lyr_PadrnRP_1.getSource().getFeatures().length > 0
    ) {
        generarTablaDesdeLayer(lyr_PadrnRP_1);
    } else {
        setTimeout(esperarYGenerarTabla, 500);
    }
}

// iniciar
esperarYGenerarTabla();

</script>
