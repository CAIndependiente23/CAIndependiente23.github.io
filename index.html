<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="./resources/ol.css">
<link rel="stylesheet" href="resources/fontawesome-all.min.css">
<link rel="stylesheet" type="text/css" href="resources/horsey.min.css">
<link rel="stylesheet" type="text/css" href="resources/ol-search-layer.min.css">
<link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
<link rel="stylesheet" href="./resources/ol-layerswitcher.css">
<link rel="stylesheet" href="./resources/qgis2web.css">

<style>

/* =========================
   FULLSCREEN MAPA
========================= */
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}

#map {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
}

/* =========================
   BOTÓN
========================= */
#btn-tabla {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    padding: 10px 12px;
    background: white;
    border: 1px solid #ccc;
    cursor: pointer;
}

/* =========================
   PANEL LATERAL
========================= */
#panel-tabla {
    position: fixed;
    top: 0;
    left: -450px;
    width: 420px;
    height: 100vh;
    background: white;
    z-index: 9998;
    overflow: auto;
    transition: left 0.3s ease;
    box-shadow: 2px 0 10px rgba(0,0,0,0.2);
}

#panel-tabla.abierto {
    left: 0;
}

/* =========================
   TABLA
========================= */
table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #ddd;
    padding: 5px;
    font-size: 12px;
    white-space: nowrap;
}

thead th {
    background: #f4f4f4;
}
</style>

<title>Mapa Pluvial</title>
</head>

<body>

<!-- BOTÓN -->
<button id="btn-tabla">☰ Listado</button>

<!-- PANEL -->
<div id="panel-tabla">

<h2 style="margin:10px;">RESUMEN</h2>

<table id="tabla-datos">
    <thead>
        <tr id="encabezado"></tr>
    </thead>
    <tbody></tbody>
</table>

</div>

<!-- MAPA -->
<div id="map">
    <div id="popup" class="ol-popup">
        <a href="#" id="popup-closer" class="ol-popup-closer"></a>
        <div id="popup-content"></div>
    </div>
</div>

<!-- QGIS2WEB -->
<script src="resources/qgis2web_expressions.js"></script>
<script src="./resources/functions.js"></script>
<script src="./resources/ol.js"></script>
<script src="resources/horsey.min.js"></script>
<script src="resources/ol-search-layer.js"></script>
<script src="./resources/ol-layerswitcher.js"></script>
<script src="resources/photon-geocoder-autocomplete.min.js"></script>

<script src="layers/PadrnRP_1.js"></script>
<script src="styles/PadrnRP_1_style.js"></script>
<script src="./layers/layers.js"></script>
<script src="./resources/Autolinker.min.js"></script>
<script src="./resources/qgis2web.js"></script>

<script>

/* =========================
   BOTÓN PANEL
========================= */
document.getElementById("btn-tabla").addEventListener("click", function () {
    document.getElementById("panel-tabla").classList.toggle("abierto");
});


/* =========================
   ORDEN ZONA → RP
========================= */
function ordenarFeatures(features) {

    return features.sort((a, b) => {

        const pA = a.getProperties();
        const pB = b.getProperties();

        // ZONA (Z1, Z2, Z3...)
        const zonaA = parseInt((pA['Datos_Zona'] || '').replace(/\D/g, '')) || 0;
        const zonaB = parseInt((pB['Datos_Zona'] || '').replace(/\D/g, '')) || 0;

        if (zonaA !== zonaB) {
            return zonaA - zonaB;
        }

        // RP (último número)
        const rpA = (pA['N�RP'] || '').split('-').pop();
        const rpB = (pB['N�RP'] || '').split('-').pop();

        return (parseInt(rpA) || 0) - (parseInt(rpB) || 0);
    });
}


/* =========================
   TABLA
========================= */
function generarTablaDesdeLayer(layer) {

    const tabla = document.querySelector("#tabla-datos tbody");
    const encabezado = document.querySelector("#encabezado");

    tabla.innerHTML = "";
    encabezado.innerHTML = "";

    let features = layer.getSource().getFeatures();

    features = ordenarFeatures(features);

    if (!features.length) return;

    const campos = [
        'N�RP',
        'Datos_Zona',
        'Datos_COM',
        'Datos_CALLE',
        'Datos_INICIO',
        'Datos_FIN',
        'Datos_Fecha de limpieza',
        'Datos_Fecha de verificaci�n',
        'Datos_Foto'
    ];

    const alias = {
        'N�RP': 'N° RP',
        'Datos_Zona': 'Zona',
        'Datos_COM': 'Comuna',
        'Datos_CALLE': 'Calle',
        'Datos_INICIO': 'Inicio',
        'Datos_FIN': 'Fin',
        'Datos_Fecha de limpieza': 'Fecha de limpieza',
        'Datos_Fecha de verificaci�n': 'Fecha de verificación',
        'Datos_Foto': 'Foto'
    };

    // HEADER
    campos.forEach(c => {
        let th = document.createElement("th");
        th.textContent = alias[c] || c;
        encabezado.appendChild(th);
    });

    // ROWS
    features.forEach(f => {

        let tr = document.createElement("tr");
        let p = f.getProperties();

        campos.forEach(campo => {

            let td = document.createElement("td");

            if (campo === 'Datos_Foto' && p[campo]) {
                let a = document.createElement("a");
                a.href = p[campo];
                a.target = "_blank";
                a.textContent = "Ver";
                td.appendChild(a);
            } else {
                td.textContent = p[campo] || "";
            }

            tr.appendChild(td);
        });

        tabla.appendChild(tr);
    });
}


/* =========================
   ESPERAR CARGA LAYER
========================= */
function esperarYGenerarTabla() {

    if (
        typeof lyr_PadrnRP_1 !== "undefined" &&
        lyr_PadrnRP_1.getSource() &&
        lyr_PadrnRP_1.getSource().getFeatures().length > 0
    ) {
        generarTablaDesdeLayer(lyr_PadrnRP_1);
    } else {
        setTimeout(esperarYGenerarTabla, 500);
    }
}

esperarYGenerarTabla();

</script>

</body>
</html>
