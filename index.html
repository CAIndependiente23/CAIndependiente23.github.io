<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">

<link rel="stylesheet" href="./resources/ol.css">
<link rel="stylesheet" href="resources/fontawesome-all.min.css">
<link rel="stylesheet" type="text/css" href="resources/horsey.min.css">
<link rel="stylesheet" type="text/css" href="resources/ol-search-layer.min.css">
<link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
<link rel="stylesheet" href="./resources/ol-layerswitcher.css">
<link rel="stylesheet" href="./resources/qgis2web.css">

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}

/* MAPA */
#map {
    width: 100%;
    height: 100vh;
}

/* BOTÓN */
#toggleTabla {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    padding: 10px 15px;
    background: #fff;
    border: 1px solid #ccc;
    cursor: pointer;
}

/* SIDEBAR */
#sidebar {
    position: absolute;
    top: 0;
    left: -420px;
    width: 400px;
    height: 100vh;
    background: white;
    overflow-y: auto;
    z-index: 9998;
    padding: 15px;
    transition: left 0.3s ease;
    box-shadow: 2px 0 10px rgba(0,0,0,0.2);
}

#sidebar.abierto {
    left: 0;
}

/* BUSCADOR */
#searchBox {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
}

/* CONTADOR */
#contador {
    margin: 10px 0;
    font-weight: bold;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #ddd;
    padding: 5px;
    font-size: 12px;
}
</style>

<title>Dashboard Pluvial</title>
</head>

<body>

<button id="toggleTabla">☰ Resumen</button>

<div id="sidebar">

    <h2>RESUMEN</h2>

    <input type="text" id="searchBox" placeholder="Buscar...">

    <div id="contador">Elementos: 0</div>

    <table id="tabla-datos">
        <thead>
            <tr id="encabezado"></tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div id="map">
    <div id="popup" class="ol-popup">
        <a href="#" id="popup-closer" class="ol-popup-closer"></a>
        <div id="popup-content"></div>
    </div>
</div>

<!-- SCRIPTS BASE -->
<script src="resources/ol.js"></script>
<script src="layers/PadrnRP_1.js"></script>
<script src="./layers/layers.js"></script>
<script src="./resources/qgis2web.js"></script>

<script>

let featuresGlobal = [];

/* =========================
   SIDEBAR TOGGLE
========================= */
document.getElementById("toggleTabla").addEventListener("click", () => {
    document.getElementById("sidebar").classList.toggle("abierto");
});


/* =========================
   TABLA PRINCIPAL
========================= */
function generarTablaDesdeLayer(layer) {

    const tabla = document.querySelector("#tabla-datos tbody");
    const encabezado = document.querySelector("#encabezado");

    tabla.innerHTML = "";
    encabezado.innerHTML = "";

    let features = layer.getSource().getFeatures();
    featuresGlobal = features;

    /* ORDEN */
    features.sort((a, b) => {
        const pA = a.getProperties();
        const pB = b.getProperties();

        const zonaA = parseInt((pA['Datos_Zona'] || '').replace(/\D/g, '')) || 0;
        const zonaB = parseInt((pB['Datos_Zona'] || '').replace(/\D/g, '')) || 0;

        if (zonaA !== zonaB) return zonaA - zonaB;

        const rpA = parseInt((pA['N�RP'] || '').split('-').pop()) || 0;
        const rpB = parseInt((pB['N�RP'] || '').split('-').pop()) || 0;

        return rpA - rpB;
    });

    if (!features.length) return;

    const campos = [
        'N�RP',
        'Datos_Zona',
        'Datos_COM',
        'Datos_CALLE',
        'Datos_INICIO',
        'Datos_FIN',
        'Datos_Fecha de limpieza',
        'Datos_Fecha de verificaci�n',
        'Datos_Foto'
    ];

    const alias = {
        'N�RP': 'N° RP',
        'Datos_Zona': 'Zona',
        'Datos_COM': 'Comuna',
        'Datos_CALLE': 'Calle',
        'Datos_INICIO': 'Inicio',
        'Datos_FIN': 'Fin',
        'Datos_Fecha de limpieza': 'Limpieza',
        'Datos_Fecha de verificaci�n': 'Verificación',
        'Datos_Foto': 'Foto'
    };

    /* ENCABEZADO */
    campos.forEach(c => {
        let th = document.createElement("th");
        th.textContent = alias[c] || c;
        encabezado.appendChild(th);
    });

    /* FILAS */
    features.forEach((f, i) => {

        let tr = document.createElement("tr");
        let props = f.getProperties();

        tr.dataset.index = i;

        campos.forEach(campo => {
            let td = document.createElement("td");

            if (campo === "Datos_Foto" && props[campo]) {
                let a = document.createElement("a");
                a.href = props[campo];
                a.target = "_blank";
                a.textContent = "Ver";
                td.appendChild(a);
            } else {
                td.textContent = props[campo] || "";
            }

            tr.appendChild(td);
        });

        /* CLICK EN FILA → ZOOM */
        tr.addEventListener("click", () => {
            let feature = featuresGlobal[i];
            let extent = feature.getGeometry().getExtent();
            map.getView().fit(extent, {
                duration: 800,
                maxZoom: 18
            });
        });

        tabla.appendChild(tr);
    });

    actualizarContador();
}


/* =========================
   BUSCADOR
========================= */
document.getElementById("searchBox").addEventListener("input", function () {

    let value = this.value.toLowerCase();
    let rows = document.querySelectorAll("#tabla-datos tbody tr");

    let visibles = 0;

    rows.forEach(row => {
        let text = row.textContent.toLowerCase();

        if (text.includes(value)) {
            row.style.display = "";
            visibles++;
        } else {
            row.style.display = "none";
        }
    });

    document.getElementById("contador").textContent =
        "Mostrando: " + visibles + " / " + featuresGlobal.length;
});


/* =========================
   CONTADOR
========================= */
function actualizarContador() {
    document.getElementById("contador").textContent =
        "Elementos: " + featuresGlobal.length;
}


/* =========================
   ESPERA CARGA LAYER
========================= */
function esperarYGenerarTabla() {
    if (
        typeof lyr_PadrnRP_1 !== "undefined" &&
        lyr_PadrnRP_1.getSource() &&
        lyr_PadrnRP_1.getSource().getFeatures().length > 0
    ) {
        generarTablaDesdeLayer(lyr_PadrnRP_1);
    } else {
        setTimeout(esperarYGenerarTabla, 500);
    }
}

esperarYGenerarTabla();

</script>

</body>
</html>
